name: Deploy VPS (Produção)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: 🚀 SSH → VPS → deploy-prod.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          command_timeout: 20m
          script: |
            set -Eeuo pipefail
            cd /root/uplaypagamentos
            chmod +x deploy-prod.sh install-vps.sh scripts/*.sh 2>/dev/null || true
            bash deploy-prod.sh
