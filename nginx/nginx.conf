# UPLAY Pagamentos - Nginx config (produção)
# SPA React + Vite + PWA

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Logs
    access_log  /var/log/nginx/access.log;
    error_log   /var/log/nginx/error.log warn;

    # Tamanho máximo de upload
    client_max_body_size 25M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        application/manifest+json
        image/svg+xml
        font/woff
        font/woff2;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Healthcheck
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Service Worker - NUNCA cachear
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires off;
        try_files $uri =404;
    }

    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
        try_files $uri =404;
    }

    # Manifests - sem cache
    location ~* \.(webmanifest|json)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires off;
        try_files $uri =404;
    }

    # Assets com hash (immutable) - cache longo
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # Ícones, imagens, fontes - cache razoável
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public" always;
        access_log off;
        try_files $uri =404;
    }

    # index.html - SEM cache (PWA precisa pegar versão nova)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires off;
    }

    # .well-known (Android TWA assetlinks etc.)
    location /.well-known/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # SPA fallback - todas as rotas vão para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Bloqueia arquivos sensíveis
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
}
